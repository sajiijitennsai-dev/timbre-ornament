<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timbre Ornament Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090a0e;
        --ink: #f7fbff;
        --muted: #aeb9c4;
        --line: rgba(255, 255, 255, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif;
      }

      .hero {
        position: relative;
        display: grid;
        min-height: 100svh;
        align-items: center;
        overflow: hidden;
        padding: clamp(20px, 5vw, 64px);
        background:
          linear-gradient(90deg, rgba(9, 10, 14, 0.94), rgba(9, 10, 14, 0.44)),
          #10141b;
      }

      .hero-content {
        position: relative;
        z-index: 1;
        display: grid;
        max-width: 760px;
        gap: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 9vw, 7.8rem);
        line-height: 0.88;
      }

      p {
        max-width: 52rem;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.24rem);
        line-height: 1.8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 16px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.primary {
        background: #79f2c0;
        color: #08100d;
      }

      .band {
        padding: clamp(32px, 5vw, 72px);
        border-top: 1px solid var(--line);
        background: #0d1016;
      }

      .band h2 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 4vw, 3.4rem);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" id="ornamentHost">
        <div class="hero-content">
          <h1>Decorative MIDI Mood</h1>
          <p>
            音色の反応は、背景の気配として置くと使いやすくなります。
            主役の文章や商品を邪魔せず、MIDIやページ上の操作に合わせて空気だけが変わります。
          </p>
          <div class="actions">
            <button class="primary" id="midiButton">MIDIで反応させる</button>
            <button id="sparkButton">光らせる</button>
            <button id="toneButton">色を変える</button>
          </div>
        </div>
      </section>
      <section class="band">
        <h2>普通のサイトに混ぜる</h2>
        <p>
          背景レイヤーとして入れておけば、ライブ告知、展示ページ、ポートフォリオ、音楽アプリの待機画面などで
          “音に関係ある感じ”だけを自然に足せます。
        </p>
      </section>
    </main>

    <script src="./ornament.js"></script>
    <script>
      const ornament = TimbreOrnament.mount("#ornamentHost", {
        opacity: 0.72,
        intensity: 0.82,
        autoDemo: true,
      });

      let tone = 0;
      document.querySelector("#sparkButton").addEventListener("click", () => ornament.hit(0.9));
      document.querySelector("#toneButton").addEventListener("click", () => {
        tone += 1;
        ornament.setTone(tone);
        ornament.hit(0.72);
      });
      document.querySelector("#midiButton").addEventListener("click", async () => {
        const result = await ornament.enableMidi();
        document.querySelector("#midiButton").textContent = result.ok ? "MIDI接続中" : "MIDI未対応";
      });
    </script>
  </body>
</html>
